<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeless Match</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

input,button{
padding:12px;
margin:8px;
width:80%;
border-radius:8px;
border:none;
}

button{
background:gold;
color:black;
font-weight:bold;
}
</style>
</head>

<body>

<h1>❤️ Timeless Match</h1>
<p>Love Beyond Time</p>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<br>

<button onclick="register()">Sign Up</button>

<button onclick="login()">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "PASTE-API-KEY",
authDomain: "PASTE-AUTH-DOMAIN",
projectId: "PASTE-PROJECT-ID",
storageBucket: "PASTE-STORAGE",
messagingSenderId: "PASTE-SENDER-ID",
appId: "PASTE-APP-ID"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.register = function(){

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>alert("Registration Successful"))

.catch(e=>alert(e.message));

}

window.login = function(){

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>alert("Login Successful"))

.catch(e=>alert(e.message));

}

</script>

</body>
</html>
